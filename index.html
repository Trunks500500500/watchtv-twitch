<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WatchTV</title>
  
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237c6fff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='2' y='7' width='20' height='15' rx='2' ry='2'/><polyline points='17 2 12 7 7 2'/><polygon points='10 11 15 14.5 10 18 10 11' fill='%237c6fff' stroke='none'/></svg>">
  
  <script src="https://player.twitch.tv/js/embed/v1.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #060608;
      --surface:     #0e0e12;
      --panel:       #111116;
      --border:      #1f1f28;
      --text:        #e6e6f0;
      --muted:       #606075;
      --accent:      #7c6fff;
      --accent-dim:  rgba(124,111,255,.18);
      --live:        #ef4444;
      --online:      #22d3a0;
      --ctrl-bg:     linear-gradient(to top, rgba(6,6,8,.97) 0%, transparent 100%);
      --info-bg:     linear-gradient(to bottom, rgba(6,6,8,.97) 0%, transparent 100%);
      --hover:       rgba(255,255,255,.055);
      --mono:        'JetBrains Mono', monospace;
      --radius:      10px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;width:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overflow:hidden}

    /* ── LAYOUT ── */
    #app{display:flex;height:100%;width:100%;background:#000}
    #video-container{flex:1;display:flex;flex-direction:column;position:relative;min-width:0;overflow:hidden}

    /* ── STREAM INFO BAR ── */
    #info-bar{
      position:absolute;top:0;left:0;right:0;
      background:var(--info-bg);
      padding:12px 18px 44px;
      display:flex;align-items:center;gap:10px;
      z-index:50;user-select:none;
      transition:opacity .4s ease, transform .4s ease;
      pointer-events:none;
    }
    #info-bar.hide{opacity:0;transform:translateY(-6px)}
    
    /* ── BRANDING ── */
    .app-brand {
      display: flex; align-items: center; gap: 8px;
      font-weight: 800; font-size: 15px; letter-spacing: 0.05em;
      color: #fff;
      margin-right: 12px;
      text-transform: uppercase;
    }
    .app-brand svg {
      width: 22px; height: 22px;
      color: var(--accent);
    }
    .brand-divider {
      width: 1px; height: 14px; background: var(--border); margin-right: 8px;
    }

    .game-badge{
      background:var(--accent-dim);border:1px solid rgba(124,111,255,.35);
      color:#b3a8ff;font-size:11px;font-weight:700;letter-spacing:.05em;
      padding:3px 9px;border-radius:5px;white-space:nowrap;flex-shrink:0;
    }
    .stream-title{
      font-size:13px;font-weight:500;color:var(--text);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;
    }
    .uptime-pill{
      display:flex;align-items:center;gap:6px;white-space:nowrap;
      font-family:var(--mono);font-size:11px;color:var(--muted);
    }
    .uptime-dot{width:5px;height:5px;background:var(--online);border-radius:50%;animation:blink 2s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

    /* ── MAIN EMBED ── */
    #twitch-embed{position:absolute;inset:0;width:100%;height:100%;pointer-events:auto;transition:opacity .3s}
    #twitch-embed iframe{width:100%!important;height:100%!important;border:none}

    /* ── MULTI-STREAM GRID & LAYOUTS ── */
    #multi-grid{
      display:none;position:absolute;inset:0;
      gap:3px;background:#000;z-index:20;
    }
    #multi-grid.on{display:grid}
    
    /* Layout: 2x2 Clásico */
    #multi-grid.layout-grid {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
    }
    /* Layout: 1 Principal + 3 Pequeños */
    #multi-grid.layout-1main {
      grid-template-columns: 3fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
    }
    #multi-grid.layout-1main #mslot-0 { grid-row: 1 / span 3; }

    .m-slot{position:relative;background:#080810;overflow:hidden;cursor:pointer}
    .m-slot.active-slot{outline:2px solid var(--accent);outline-offset:-2px}
    .m-slot-label{
      position:absolute;top:8px;left:8px;z-index:5;
      background:rgba(0,0,0,.75);backdrop-filter:blur(6px);
      border:1px solid var(--border);border-radius:5px;
      padding:3px 9px;font-size:11px;font-weight:700;color:#fff;
      pointer-events:none;
    }
    .m-slot-close {
      position:absolute;top:8px;right:8px;z-index:5;
      background:rgba(239,68,68,.75);backdrop-filter:blur(6px);
      border:1px solid rgba(239,68,68,.3);border-radius:5px;
      padding:3px 7px;font-size:11px;font-weight:700;color:#fff;
      cursor:pointer; transition: background .2s;
    }
    .m-slot-close:hover { background: var(--live); }
    .m-slot-prompt{
      position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:10px;
      background:rgba(0,0,0,.55);z-index:4;
    }
    .m-slot-prompt p{font-size:12px;color:var(--muted);font-weight:600}
    .m-slot-prompt input{
      background:rgba(255,255,255,.08);border:1px solid var(--border);
      color:#fff;font-family:'Barlow',sans-serif;font-size:14px;font-weight:600;
      padding:8px 14px;border-radius:8px;outline:none;text-align:center;width:170px;
    }
    .m-slot-prompt input:focus{border-color:var(--accent)}

    /* ── CONTROLS BAR ── */
    .controls{
      position:absolute;bottom:0;left:0;right:0;height:58px;
      background:var(--ctrl-bg);
      display:flex;align-items:center;padding:0 14px;gap:8px;
      z-index:50;user-select:none;
      transition:opacity .4s ease, transform .4s ease;
    }
    .controls.hide{opacity:0;transform:translateY(8px);pointer-events:none}
    .cg{display:flex;align-items:center;gap:8px}
    .cg-l{flex:1}
    .cg-c{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:6px}
    .cg-r{flex:1;justify-content:flex-end}

    /* Buttons */
    .btn{
      background:none;border:none;color:var(--muted);cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      padding:6px;border-radius:7px;
      transition:color .15s,background .15s,transform .1s;
      position:relative;
    }
    .btn:hover{color:var(--text);background:var(--hover);transform:scale(1.08)}
    .btn.on{color:var(--accent)}
    .btn-tip{
      position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
      background:var(--surface);border:1px solid var(--border);border-radius:5px;
      padding:4px 8px;font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;
      pointer-events:none;opacity:0;transition:opacity .15s;
    }
    .btn:hover .btn-tip{opacity:1}

    .divider{width:1px;height:16px;background:var(--border);flex-shrink:0}

    /* Volume */
    .vol-wrap{display:flex;align-items:center;gap:7px}
    .vol-slider{
      -webkit-appearance:none;appearance:none;width:72px;height:3px;
      background:rgba(255,255,255,.15);border-radius:2px;outline:none;cursor:pointer;
    }
    .vol-slider::-webkit-slider-thumb{
      -webkit-appearance:none;appearance:none;width:11px;height:11px;border-radius:50%;
      background:var(--text);cursor:pointer;transition:transform .15s, background .15s;
    }
    .vol-slider:hover::-webkit-slider-thumb{transform:scale(1.35);background:#fff}

    /* Live badge */
    .live-badge{
      display:flex;align-items:center;gap:5px;
      font-size:10px;font-weight:800;letter-spacing:.07em;
      background:rgba(239,68,68,.14);border:1px solid rgba(239,68,68,.3);
      color:var(--live);padding:2px 8px;border-radius:5px;
    }
    .live-badge.offline{
      background:rgba(96,96,117,.12);border-color:rgba(96,96,117,.25);color:var(--muted);
    }
    .live-dot{width:5px;height:5px;background:var(--live);border-radius:50%;animation:blink 1.5s infinite}

    /* Viewers */
    .viewers{
      font-family:var(--mono);font-size:12px;font-weight:600;color:var(--muted);
      display:flex;align-items:center;gap:5px;
    }
    .viewers svg{opacity:.55}

    /* Channel input widget */
    .ch-wrap{
      position:relative;display:flex;align-items:center;gap:6px;
      background:var(--hover);border:1px solid var(--border);
      padding:4px 10px 4px 5px;border-radius:20px;
      transition:border-color .2s;
    }
    .ch-wrap:focus-within{border-color:var(--accent)}
    .ch-avatar{
      width:20px;height:20px;border-radius:50%;
      background:var(--surface);overflow:hidden;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      font-size:8px;font-weight:700;color:var(--muted);
    }
    .ch-avatar img{width:100%;height:100%;object-fit:cover;display:none}
    .ch-input{
      background:transparent;border:none;color:var(--text);
      font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;
      width:88px;outline:none;
    }
    .ch-input::placeholder{color:var(--muted);font-weight:400}

    /* Dropdown */
    .ch-dropdown{
      position:absolute;bottom:calc(100% + 10px);left:0;
      background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
      width:240px;max-height:330px;overflow-y:auto;
      display:none;flex-direction:column;z-index:200;
      box-shadow:0 20px 60px rgba(0,0,0,.75);padding:6px;
    }
    .ch-dropdown.open{display:flex}
    .dd-section{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;padding:6px 8px 3px}
    .dd-item{
      display:flex;align-items:center;gap:9px;
      padding:7px 8px;cursor:pointer;border-radius:7px;
      transition:background .15s;
    }
    .dd-item:hover{background:var(--hover)}
    .dd-av{
      width:26px;height:26px;border-radius:50%;
      background:var(--panel);overflow:hidden;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      font-size:9px;font-weight:700;color:var(--muted);
    }
    .dd-av img{width:100%;height:100%;object-fit:cover}
    .dd-name{flex:1;font-size:13px;font-weight:600;color:var(--text)}
    
    .fav-btn{
      background:none;border:none;cursor:pointer;padding:3px;border-radius:4px;
      color:var(--muted);transition:color .15s, transform .1s;flex-shrink:0;
    }
    .fav-btn:hover,.fav-btn.on{color:#f59e0b; transform:scale(1.1)}
    .dd-empty{padding:14px 8px;text-align:center;font-size:12px;color:var(--muted)}

    /* Settings menu */
    .settings-menu{
      position:absolute;bottom:66px;right:14px;
      background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
      padding:6px;min-width:188px;
      display:none;flex-direction:column;z-index:200;
      box-shadow:0 20px 60px rgba(0,0,0,.75);
    }
    .settings-menu.open{display:flex}
    .sm-section{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;padding:6px 10px 3px}
    .sm-item{
      display:flex;align-items:center;justify-content:space-between;
      padding:8px 10px;font-size:13px;font-weight:500;cursor:pointer;
      border-radius:7px;color:var(--text);gap:8px;
      transition:background .15s;
    }
    .sm-item:hover{background:var(--hover)}
    .sm-item.on{color:var(--accent)}
    .sm-check{color:var(--accent);font-size:12px}
    .sm-div{height:1px;background:var(--border);margin:4px 0}

    /* Chat panel & Tabs */
    #chat-panel{
      width:340px;background:var(--panel);border-left:1px solid var(--border);
      transition:width .35s cubic-bezier(.4,0,.2,1);flex-shrink:0;
      display:flex; flex-direction:column;
    }
    #chat-panel.hidden{width:0;border:none}
    
    .chat-tabs {
      display:none; background:var(--bg); border-bottom:1px solid var(--border);
      padding:6px; gap:4px; flex-wrap:wrap;
    }
    .chat-tabs.show { display:flex; }
    .chat-tab {
      flex:1; background:var(--surface); border:1px solid var(--border); color:var(--muted);
      font-size:11px; font-weight:600; padding:5px; text-align:center; cursor:pointer;
      border-radius:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      transition: all .2s;
    }
    .chat-tab:hover { color:var(--text); }
    .chat-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }

    .chat-frame-wrap { flex:1; width:100%; }
    .chat-frame-wrap iframe{width:100%;height:100%;border:none}

    /* Toggle pill */
    .toggle-wrap{display:flex;align-items:center;gap:7px;cursor:pointer}
    .toggle-label{font-size:12px;font-weight:600;color:var(--muted);transition:color .2s}
    .toggle-wrap:hover .toggle-label{color:var(--text)}
    .tog{position:relative;width:32px;height:18px;background:var(--border);border-radius:10px;transition:background .3s;flex-shrink:0}
    .tog.on{background:var(--accent)}
    .tog-thumb{position:absolute;top:3px;left:3px;width:12px;height:12px;background:#fff;border-radius:50%;transition:transform .3s}
    .tog.on .tog-thumb{transform:translateX(14px)}

    /* Clock */
    .clock{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.04em}

    /* Mini Player */
    #mini-player{
      position:fixed;bottom:76px;right:18px;
      width:320px;height:180px;
      background:#000;border:1px solid var(--border);border-radius:12px;
      overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.85);
      display:none;z-index:500;
    }
    #mini-player.on{display:block}
    #mini-player.dragging{box-shadow:0 32px 80px rgba(0,0,0,.95);cursor:grabbing}
    .mini-bar{
      position:absolute;top:0;left:0;right:0;
      background:linear-gradient(to bottom,rgba(0,0,0,.85),transparent);
      padding:8px 10px;display:flex;align-items:center;justify-content:space-between;
      z-index:10;cursor:grab;
    }
    .mini-bar.dragging{cursor:grabbing}
    .mini-title{font-size:11px;font-weight:700;color:#fff;pointer-events:none;}
    .mini-close{
      background:rgba(255,255,255,.15);border:none;color:#fff;
      width:20px;height:20px;border-radius:50%;cursor:pointer;
      display:flex;align-items:center;justify-content:center;font-size:11px;
      transition:background .15s;
    }
    .mini-close:hover{background:rgba(255,255,255,.3)}
    #mini-embed{width:100%;height:100%;pointer-events:auto;}
    #mini-mute-badge{
      position:absolute;bottom:8px;left:8px;z-index:10;
      background:rgba(0,0,0,.7);border:1px solid var(--border);border-radius:5px;
      padding:2px 8px;font-size:10px;font-weight:700;color:var(--muted);
      pointer-events:none;
    }

    /* KB Panel */
    #kb-panel{
      position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);
      z-index:900;display:none;align-items:center;justify-content:center;
    }
    #kb-panel.open{display:flex}
    .kb-card{
      background:var(--surface);border:1px solid var(--border);border-radius:14px;
      padding:28px;width:400px;max-width:90vw;
      box-shadow:0 32px 80px rgba(0,0,0,.8);
    }
    .kb-head{font-size:16px;font-weight:800;color:var(--text);margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
    .kb-x{background:var(--hover);border:none;color:var(--muted);width:28px;height:28px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:color .15s}
    .kb-x:hover{color:var(--text)}
    .kb-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
    .kb-row:last-child{border:none}
    .kb-desc{font-size:13px;color:var(--muted)}
    .kb-key{background:var(--panel);border:1px solid var(--border);border-radius:5px;padding:3px 9px;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text)}

    /* Theater mode */
    body.theater #chat-panel{width:0!important;border:none!important}

    /* Scrollbars */
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
  </style>
</head>
<body>

<div id="app">
  <div id="video-container">

    <div id="info-bar">
      <div class="app-brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect>
          <polyline points="17 2 12 7 7 2"></polyline>
          <polygon points="10 11 15 14.5 10 18 10 11" fill="currentColor" stroke="none"></polygon>
        </svg>
        WatchTV
      </div>
      <div class="brand-divider"></div>

      <span class="game-badge" id="streamGame">—</span>
      <span class="stream-title" id="streamTitle">Cargando información del stream…</span>
      <span class="uptime-pill"><span class="uptime-dot"></span><span id="uptimeText">—</span></span>
    </div>

    <div id="twitch-embed"></div>

    <div id="multi-grid" class="layout-grid"></div>

    <div class="controls" id="controls">

      <div class="cg cg-l">
        <button class="btn" id="btn-play" onclick="togglePlay()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/></svg>
          <span class="btn-tip">Play/Pause</span>
        </button>

        <div class="vol-wrap">
          <button class="btn" id="btn-mute" onclick="toggleMute()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
            <span class="btn-tip">Silenciar (M)</span>
          </button>
          <input type="range" class="vol-slider" id="vol" min="0" max="1" step="0.01" value="0.5" oninput="changeVolume(this.value)">
        </div>

        <div class="divider"></div>

        <div class="live-badge" id="liveBadge"><div class="live-dot"></div>LIVE</div>
        <div class="viewers">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/></svg>
          <span id="viewerCount">—</span>
        </div>

        <div class="divider"></div>

        <div class="ch-wrap">
          <button id="btn-fav-current" class="fav-btn" onclick="toggleFavStatus(S.channel)" style="padding:0 4px; margin-left: 2px;">
            <svg id="fav-icon-current" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
          </button>
          <div class="ch-avatar" id="chAvatar">
            <img id="chAvatarImg" src="" alt="">
          </div>
          <input type="text" id="chInput" class="ch-input" spellcheck="false" autocomplete="off" placeholder="Canal…">
          <div class="ch-dropdown" id="chDropdown"></div>
        </div>
      </div>

      <div class="cg cg-c">
        <span class="clock" id="clock">00:00:00</span>
      </div>

      <div class="cg cg-r">
        <button class="btn" id="btn-pip" onclick="toggleMini()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><rect x="12" y="10" width="8" height="5" rx="1" fill="currentColor" stroke="none" opacity=".8"/></svg>
          <span class="btn-tip">Mini Player (P)</span>
        </button>

        <button class="btn" id="btn-layout" onclick="toggleLayout()" style="display:none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
          <span class="btn-tip">Diseño Multi (L)</span>
        </button>

        <button class="btn" id="btn-multi" onclick="toggleMulti()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="9" height="9" rx="1.2"/><rect x="13" y="2" width="9" height="9" rx="1.2"/><rect x="2" y="13" width="9" height="9" rx="1.2"/><rect x="13" y="13" width="9" height="9" rx="1.2"/></svg>
          <span class="btn-tip">Multi-stream (G)</span>
        </button>

        <button class="btn" id="btn-theater" onclick="toggleTheater()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="8" y1="5" x2="8" y2="19"/></svg>
          <span class="btn-tip">Modo Teatro (T)</span>
        </button>

        <div class="divider"></div>

        <div class="toggle-wrap" onclick="toggleChat()">
          <span class="toggle-label">Chat</span>
          <div class="tog on" id="chatTog"><div class="tog-thumb"></div></div>
        </div>

        <div class="divider"></div>

        <button class="btn" onclick="openSettings()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span class="btn-tip">Calidad</span>
        </button>

        <button class="btn" onclick="toggleFullscreen()">
          <svg id="fsIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
          <span class="btn-tip">Pantalla completa (F)</span>
        </button>

        <div class="settings-menu" id="settingsMenu"></div>
      </div>
    </div>
  </div>

  <div id="chat-panel">
    <div id="chat-tabs" class="chat-tabs"></div>
    <div class="chat-frame-wrap">
      <iframe id="chatFrame" src=""></iframe>
    </div>
  </div>
</div>

<div id="mini-player">
  <div class="mini-bar" id="miniBar">
    <span class="mini-title" id="miniTitle">Mini Player</span>
    <button class="mini-close" onclick="toggleMini()">✕</button>
  </div>
  <div id="mini-embed"></div>
  <div id="mini-mute-badge">🔇 Muted</div>
</div>

<div id="kb-panel" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="kb-card">
    <div class="kb-head">
      Atajos de teclado
      <button class="kb-x" onclick="document.getElementById('kb-panel').classList.remove('open')">✕</button>
    </div>
    <div class="kb-row"><span class="kb-desc">Play / Pause</span><span class="kb-key">Space</span></div>
    <div class="kb-row"><span class="kb-desc">Silenciar</span><span class="kb-key">M</span></div>
    <div class="kb-row"><span class="kb-desc">Pantalla completa</span><span class="kb-key">F</span></div>
    <div class="kb-row"><span class="kb-desc">Modo Teatro</span><span class="kb-key">T</span></div>
    <div class="kb-row"><span class="kb-desc">Mini Player</span><span class="kb-key">P</span></div>
    <div class="kb-row"><span class="kb-desc">Multi-stream</span><span class="kb-key">G</span></div>
    <div class="kb-row"><span class="kb-desc">Cambiar Diseño Multi</span><span class="kb-key">L</span></div>
    <div class="kb-row"><span class="kb-desc">Volumen +10%</span><span class="kb-key">↑</span></div>
    <div class="kb-row"><span class="kb-desc">Volumen −10%</span><span class="kb-key">↓</span></div>
    <div class="kb-row"><span class="kb-desc">Esta ayuda</span><span class="kb-key">?</span></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   STATE + PERSISTENCE
════════════════════════════════════════════════════════ */
const DEFAULT_FAVS = ['Diegaskun','ibai','auronplay','rubius','elxokas','rivers_gg','illojuan','knekro','TheGrefg','xQc'];

let S = {
  channel:       'Diegaskun',
  volume:        0.5,
  muted:         false,
  chatOpen:      true,
  theater:       false,
  multiOn:       false,
  multiLayout:   'grid',
  miniOn:        false,
  quality:       'auto',
  favorites:     [...DEFAULT_FAVS],
  multiChannels: ['Diegaskun','','',''],
};

function loadS() {
  try {
    const raw = localStorage.getItem('wtv2_state');
    if (!raw) return;
    const d = JSON.parse(raw);
    Object.assign(S, {
      channel:       d.channel    || S.channel,
      volume:        d.volume     != null ? d.volume : S.volume,
      muted:         d.muted      || false,
      chatOpen:      d.chatOpen   != null ? d.chatOpen : true,
      favorites:     Array.isArray(d.favorites) ? d.favorites : DEFAULT_FAVS,
      multiChannels: Array.isArray(d.multiChannels) ? d.multiChannels : S.multiChannels,
      multiLayout:   d.multiLayout || 'grid',
      miniOn:        d.miniOn     || false,
      quality:       d.quality    || 'auto'
    });
  } catch(e){}
}
function saveS() {
  try { localStorage.setItem('wtv2_state', JSON.stringify(S)); } catch(e){}
}

/* ═══════════════════════════════════════════════════════
   REFS & UTILS
════════════════════════════════════════════════════════ */
const $app      = document.getElementById('app');
const $controls = document.getElementById('controls');
const $infoBar  = document.getElementById('info-bar');
const $chInput  = document.getElementById('chInput');
const $chDrop   = document.getElementById('chDropdown');
const $settings = document.getElementById('settingsMenu');
const $chat     = document.getElementById('chat-panel');
const $chatTog  = document.getElementById('chatTog');
const $chatFrm  = document.getElementById('chatFrame');
const $multiG   = document.getElementById('multi-grid');
const $mini     = document.getElementById('mini-player');
const $miniEmb  = document.getElementById('mini-embed');
const $miniBar  = document.getElementById('miniBar');
const $chatTabs = document.getElementById('chat-tabs');

let mainPlayer         = null;
let miniPlayer2        = null;
let multiPlayers       = [null,null,null,null];
let activeSlot         = 0;
let viewerTimer        = null;
let infoTimer          = null;
let currentChatChannel = S.channel;

const getParents = () => [window.location.hostname || 'localhost', '127.0.0.1', 'localhost'];

/* ═══════════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════════════ */
window.addEventListener('load', () => {
  loadS();
  $chInput.value = S.channel;
  document.getElementById('vol').value = S.volume;

  if (!S.chatOpen) { $chat.classList.add('hidden'); $chatTog.classList.remove('on'); }
  if (S.theater) { document.body.classList.add('theater'); document.getElementById('btn-theater').classList.add('on'); }
  
  $multiG.className = `layout-${S.multiLayout}`;

  initPlayer(S.channel);
  tickClock();
  setInterval(tickClock, 1000);
});

window.addEventListener('click', e => {
  if(!e.target.closest('#settingsMenu') && !e.target.closest('button[onclick="openSettings()"]')) {
    $settings.classList.remove('open');
  }
});

/* ═══════════════════════════════════════════════════════
   PLAYER & CHAT ROUTING
════════════════════════════════════════════════════════ */
function initPlayer(ch) {
  S.channel = ch;
  saveS();

  const emb = document.getElementById('twitch-embed');
  emb.innerHTML = '';

  mainPlayer = new Twitch.Player('twitch-embed', {
    channel: ch, width:'100%', height:'100%',
    autoplay:true, controls:false, parent: getParents(),
  });

  mainPlayer.addEventListener(Twitch.Player.PLAYING, () => {
    setPlayBtn(true);
    mainPlayer.setVolume(S.volume);
    if (S.muted) mainPlayer.setMuted(true);
    loadQualities();
  });
  mainPlayer.addEventListener(Twitch.Player.PAUSE, () => setPlayBtn(false));

  // Actualizar Chat y UI
  updateChatTabs();
  loadAvatar(ch, document.getElementById('chAvatarImg'));
  document.getElementById('chAvatar').title = ch;
  updateCurrentFavIcon();

  // Mini Player
  document.getElementById('miniTitle').textContent = ch;
  if(S.miniOn) initMiniEmbed(ch);

  // Data
  clearInterval(viewerTimer); clearInterval(infoTimer);
  fetchViewers(ch); fetchInfo(ch);
  viewerTimer = setInterval(() => fetchViewers(S.channel), 12000);
  infoTimer   = setInterval(() => fetchInfo(S.channel), 60000);
}

function loadChat(ch) {
  const url = `https://www.twitch.tv/embed/${ch}/chat?darkpopout&parent=${window.location.hostname || 'localhost'}`;
  if ($chatFrm.src !== url) $chatFrm.src = url;
}

function togglePlay() {
  if (!mainPlayer) return;
  if (mainPlayer.isPaused()) mainPlayer.play(); else mainPlayer.pause();
}
function setPlayBtn(playing) {
  document.getElementById('btn-play').innerHTML = playing
    ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/></svg><span class="btn-tip">Pause (Space)</span>`
    : `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg><span class="btn-tip">Play (Space)</span>`;
}

function toggleMute() {
  if (!mainPlayer) return;
  S.muted = !mainPlayer.getMuted();
  mainPlayer.setMuted(S.muted);
  setMuteBtn(S.muted); saveS();
}
function changeVolume(v) {
  if (!mainPlayer) return;
  S.volume = parseFloat(v);
  mainPlayer.setVolume(S.volume);
  if (S.volume > 0 && mainPlayer.getMuted()) { mainPlayer.setMuted(false); S.muted = false; }
  setMuteBtn(S.volume == 0); saveS();
}
function setMuteBtn(m) {
  document.getElementById('btn-mute').innerHTML = m
    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg><span class="btn-tip">Activar sonido (M)</span>`
    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/></svg><span class="btn-tip">Silenciar (M)</span>`;
}

/* ═══════════════════════════════════════════════════════
   SETTINGS & QUALITY
════════════════════════════════════════════════════════ */
function openSettings() { $settings.classList.toggle('open'); }
function loadQualities() {
  if(!mainPlayer) return;
  try {
    const qs = mainPlayer.getQualities();
    $settings.innerHTML = '<div class="sm-section">Calidad</div>';
    createQItem('auto', 'Auto');
    if(qs && qs.length) { qs.forEach(q => { if(q.name !== 'auto') createQItem(q.name, q.name); }); }
  } catch(e) {}
}
function createQItem(val, lbl) {
  const d = document.createElement('div');
  d.className = `sm-item ${S.quality === val ? 'on' : ''}`;
  d.innerHTML = `<span>${lbl}</span> ${S.quality === val ? '<span class="sm-check">✓</span>' : ''}`;
  d.onclick = () => {
    mainPlayer.setQuality(val); S.quality = val; saveS();
    loadQualities(); $settings.classList.remove('open');
  };
  $settings.appendChild(d);
}

/* ═══════════════════════════════════════════════════════
   CHANNEL DROPDOWN + NEW FAVORITES LOGIC
════════════════════════════════════════════════════════ */
function toggleFavStatus(ch) {
  const cLow = ch.toLowerCase().trim();
  if(!cLow) return;
  const idx = S.favorites.findIndex(f => f.toLowerCase() === cLow);
  if(idx > -1) S.favorites.splice(idx, 1);
  else S.favorites.push(ch);
  
  saveS();
  updateCurrentFavIcon();
  buildDropdown($chInput.value); // Refresca lista si está abierta
}

function updateCurrentFavIcon() {
  const icon = document.getElementById('fav-icon-current');
  const btn = document.getElementById('btn-fav-current');
  if (S.favorites.some(f => f.toLowerCase() === S.channel.toLowerCase())) {
    icon.setAttribute('fill', 'currentColor');
    btn.classList.add('on');
  } else {
    icon.setAttribute('fill', 'none');
    btn.classList.remove('on');
  }
}

function buildDropdown(filter = '') {
  $chDrop.innerHTML = '';
  const lf = filter.toLowerCase().trim();
  const list = S.favorites.filter(c => c.toLowerCase().includes(lf));

  // Si escribiste un canal nuevo que NO está en favoritos, se añade temporalmente para que puedas darle a la estrella
  if (lf && !S.favorites.some(c => c.toLowerCase() === lf)) {
    list.unshift(filter);
  }

  if (!list.length) {
    $chDrop.innerHTML = `<div class="dd-empty">Presiona Enter para buscar...</div>`;
    return;
  }

  const lbl = document.createElement('div');
  lbl.className = 'dd-section'; lbl.textContent = 'Canales';
  $chDrop.appendChild(lbl);

  list.forEach(ch => {
    const item = document.createElement('div');
    item.className = 'dd-item';
    const isFav = S.favorites.some(f => f.toLowerCase() === ch.toLowerCase());
    
    item.innerHTML = `
      <div class="dd-av" id="dav-${ch}">${ch.substring(0,2).toUpperCase()}</div>
      <span class="dd-name">${ch}</span>
      <button class="fav-btn ${isFav?'on':''}" title="${isFav?'Quitar favorito':'Agregar favorito'}">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="${isFav?'currentColor':'none'}" stroke="currentColor" stroke-width="2">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      </button>`;

    item.onmousedown = e => {
      if (e.target.closest('.fav-btn')) return;
      e.preventDefault();
      switchChannel(ch);
    };
    item.querySelector('.fav-btn').onmousedown = e => {
      e.preventDefault(); e.stopPropagation();
      toggleFavStatus(ch);
    };
    $chDrop.appendChild(item);
    loadAvatar(ch, null, `dav-${ch}`);
  });
}

$chInput.addEventListener('focus',  () => { buildDropdown($chInput.value); $chDrop.classList.add('open'); });
$chInput.addEventListener('input',  () => buildDropdown($chInput.value));
$chInput.addEventListener('blur',   () => setTimeout(() => $chDrop.classList.remove('open'), 180));
$chInput.addEventListener('keydown', e => { if (e.key==='Enter') { const v=$chInput.value.trim(); if(v) switchChannel(v); } e.stopPropagation(); });

function switchChannel(name) {
  $chInput.value = name;
  $chDrop.classList.remove('open');
  if (name !== S.channel) initPlayer(name);
}

/* ═══════════════════════════════════════════════════════
   MULTISTREAM (LAYOUTS & TABS DE CHAT)
════════════════════════════════════════════════════════ */
function toggleMulti() {
  S.multiOn = !S.multiOn;
  const btn = document.getElementById('btn-multi');
  const btnLayout = document.getElementById('btn-layout');

  if (S.multiOn) {
    btn.classList.add('on');
    btnLayout.style.display = 'flex'; // Muestra botón Layout
    $multiG.classList.add('on');
    document.getElementById('twitch-embed').style.display = 'none';
    $infoBar.style.display = 'none';
    if(mainPlayer) mainPlayer.pause();
    initMulti();
  } else {
    btn.classList.remove('on');
    btnLayout.style.display = 'none'; // Oculta botón Layout
    $multiG.classList.remove('on');
    document.getElementById('twitch-embed').style.display = 'block';
    $infoBar.style.display = '';
    if(mainPlayer) mainPlayer.play();
    $multiG.innerHTML = '';
    multiPlayers = [null,null,null,null];
    updateChatTabs();
  }
}

function toggleLayout() {
  S.multiLayout = S.multiLayout === 'grid' ? '1main' : 'grid';
  saveS();
  $multiG.className = `on layout-${S.multiLayout}`;
}

function initMulti() {
  $multiG.innerHTML = '';
  for(let i=0; i<4; i++) {
    const slot = document.createElement('div');
    slot.className = `m-slot ${i === activeSlot ? 'active-slot' : ''}`;
    slot.id = `mslot-${i}`;
    slot.onclick = (e) => { 
      if(!e.target.closest('input') && !e.target.closest('.m-slot-close')) setActiveSlot(i);
    };

    const ch = S.multiChannels[i];
    if (ch) {
      slot.innerHTML = `
        <div class="m-slot-label">${ch}</div>
        <button class="m-slot-close" onclick="closeMultiChannel(${i})">X</button>
        <div id="mplayer-${i}" style="width:100%;height:100%"></div>`;
      $multiG.appendChild(slot);
      multiPlayers[i] = new Twitch.Player(`mplayer-${i}`, {
        channel: ch, width: '100%', height: '100%', muted: i !== activeSlot, controls: false, parent: getParents()
      });
    } else {
      slot.innerHTML = `
        <div class="m-slot-prompt">
          <p>Añadir stream</p>
          <input type="text" placeholder="Canal..." onkeydown="if(event.key==='Enter') setMultiChannel(${i}, this.value)">
        </div>`;
      $multiG.appendChild(slot);
      multiPlayers[i] = null;
    }
  }
  updateChatTabs();
}

function setMultiChannel(idx, ch) {
  if(!ch.trim()) return;
  S.multiChannels[idx] = ch.trim();
  saveS();
  initMulti();
}

function closeMultiChannel(idx) {
  S.multiChannels[idx] = '';
  saveS();
  initMulti();
}

function setActiveSlot(idx) {
  activeSlot = idx;
  document.querySelectorAll('.m-slot').forEach((el, i) => {
    el.classList.toggle('active-slot', i === idx);
    if(multiPlayers[i]) multiPlayers[i].setMuted(i !== idx);
  });
}

function updateChatTabs() {
  if(!S.multiOn) {
    $chatTabs.classList.remove('show');
    currentChatChannel = S.channel;
    loadChat(S.channel);
    return;
  }

  const activeChans = [];
  S.multiChannels.forEach(c => { if(c && !activeChans.includes(c)) activeChans.push(c); });
  
  // Si no hay ninguno abierto en el grid, mostrar el principal por defecto
  if(activeChans.length === 0) activeChans.push(S.channel);

  if(!activeChans.includes(currentChatChannel)) currentChatChannel = activeChans[0];

  $chatTabs.classList.add('show');
  $chatTabs.innerHTML = '';
  activeChans.forEach(ch => {
    const btn = document.createElement('div');
    btn.className = `chat-tab ${ch === currentChatChannel ? 'active' : ''}`;
    btn.textContent = ch;
    btn.onclick = () => { currentChatChannel = ch; loadChat(ch); updateChatTabs(); };
    $chatTabs.appendChild(btn);
  });

  loadChat(currentChatChannel);
}

/* ═══════════════════════════════════════════════════════
   STREAM DATA (decapi.me)
════════════════════════════════════════════════════════ */
function decapiOk(s) {
  if (!s || typeof s !== 'string') return false;
  const sl = s.toLowerCase();
  if (sl.includes('sqlstate') || sl.includes('error') || sl.includes('exception') ||
      sl.includes('not found') || sl.includes('invalid') || sl.includes('fatal') ||
      sl.includes('warning') || sl.startsWith('<') || s.length > 500) return false;
  return true;
}

async function fetchInfo(ch) {
  try {
    const [t,g,u] = await Promise.all([
      fetch(`https://decapi.me/twitch/title/${ch}`).then(r=>r.text()).catch(()=>''),
      fetch(`https://decapi.me/twitch/game/${ch}`).then(r=>r.text()).catch(()=>''),
      fetch(`https://decapi.me/twitch/uptime/${ch}`).then(r=>r.text()).catch(()=>''),
    ]);
    document.getElementById('streamTitle').textContent = decapiOk(t) ? t : '—';
    document.getElementById('streamGame').textContent  = decapiOk(g) ? g : '—';
    const uptimeOk = decapiOk(u) && !u.toLowerCase().includes('offline');
    document.getElementById('uptimeText').textContent  = uptimeOk ? u : 'Offline';
  } catch(e){}
}

async function fetchViewers(ch) {
  const el = document.getElementById('viewerCount');
  const badge = document.getElementById('liveBadge');
  try {
    const res = await fetch(`https://decapi.me/twitch/viewercount/${ch}`);
    const text = await res.text();
    if (decapiOk(text) && !text.toLowerCase().includes('offline')) {
      el.textContent = parseInt(text).toLocaleString('es-ES');
      badge.classList.remove('offline');
      badge.innerHTML = '<div class="live-dot"></div>LIVE';
    } else {
      el.textContent = '0';
      badge.classList.add('offline');
      badge.innerHTML = 'OFFLINE';
    }
  } catch(e) { el.textContent = '—'; }
}

async function loadAvatar(ch, imgEl, idStr) {
  const el = imgEl || (idStr ? document.querySelector(`#${idStr} img`) : null);
  const container = el ? el.parentElement : document.getElementById(idStr);
  if (!container) return;
  try {
    const res = await fetch(`https://decapi.me/twitch/avatar/${ch}`);
    const url = await res.text();
    if (decapiOk(url) && url.startsWith('http')) {
      if(!el) {
        container.innerHTML = `<img src="${url}" alt="" style="width:100%;height:100%;object-fit:cover;">`;
      } else {
        el.src = url;
        el.style.display = 'block';
      }
    }
  } catch(e) {}
}

/* ═══════════════════════════════════════════════════════
   MINI PLAYER (ARRASTRABLE)
════════════════════════════════════════════════════════ */
function toggleMini() {
  S.miniOn = !S.miniOn;
  if(S.miniOn) {
    $mini.classList.add('on');
    initMiniEmbed(S.channel);
  } else {
    $mini.classList.remove('on');
    $miniEmb.innerHTML = '';
    miniPlayer2 = null;
  }
  saveS();
}
function initMiniEmbed(ch) {
  $miniEmb.innerHTML = '';
  miniPlayer2 = new Twitch.Player('mini-embed', {
    channel: ch, width: '100%', height: '100%', muted: true, controls: false, parent: getParents()
  });
}
let isDragging = false, startX, startY, initialX, initialY;
$miniBar.addEventListener('mousedown', e => {
  isDragging = true;
  startX = e.clientX; startY = e.clientY;
  const rect = $mini.getBoundingClientRect();
  initialX = rect.left; initialY = rect.top;
  $mini.classList.add('dragging'); $miniBar.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if(!isDragging) return;
  $mini.style.left = `${initialX + (e.clientX - startX)}px`;
  $mini.style.top = `${initialY + (e.clientY - startY)}px`;
  $mini.style.bottom = 'auto'; $mini.style.right = 'auto'; 
});
window.addEventListener('mouseup', () => { isDragging = false; $mini.classList.remove('dragging'); $miniBar.classList.remove('dragging'); });

/* ═══════════════════════════════════════════════════════
   UI TOGGLES & MISC
════════════════════════════════════════════════════════ */
function toggleChat() {
  S.chatOpen = !S.chatOpen;
  if(S.chatOpen) { $chat.classList.remove('hidden'); $chatTog.classList.add('on'); } 
  else { $chat.classList.add('hidden'); $chatTog.classList.remove('on'); }
  saveS();
}

function toggleFullscreen() {
  const doc = window.document, docEl = doc.documentElement;
  const req = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
  const cancel = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;
  if(!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) req.call(docEl);
  else cancel.call(doc);
}

function toggleTheater() {
  S.theater = !S.theater; const btn = document.getElementById('btn-theater');
  if(S.theater) { document.body.classList.add('theater'); btn.classList.add('on'); } 
  else { document.body.classList.remove('theater'); btn.classList.remove('on'); }
  saveS();
}

function tickClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('es-ES', {hour12: false});
}

let uiTimer;
window.addEventListener('mousemove', () => {
  $controls.classList.remove('hide'); $infoBar.classList.remove('hide'); document.body.style.cursor = 'default';
  clearTimeout(uiTimer);
  uiTimer = setTimeout(() => {
    if(!document.fullscreenElement) return;
    $controls.classList.add('hide'); $infoBar.classList.add('hide'); document.body.style.cursor = 'none';
  }, 3500);
});

window.addEventListener('keydown', (e) => {
  if(['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  switch(e.key.toLowerCase()) {
    case ' ': e.preventDefault(); togglePlay(); break;
    case 'm': toggleMute(); break;
    case 'f': toggleFullscreen(); break;
    case 't': toggleTheater(); break;
    case 'p': toggleMini(); break;
    case 'g': toggleMulti(); break;
    case 'l': if(S.multiOn) toggleLayout(); break;
    case '?': document.getElementById('kb-panel').classList.add('open'); break;
  }
});
</script>
</body>
</html>
